<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Circularity</title>
    <style>
        body {
            margin: 0;
            background: #111;
            overflow: hidden;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            background: #000;
        }
        #main-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #ff3366;
            color: white;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
            z-index: 10;
        }
        .menu-btn {
            display: block;
            width: 200px;
            padding: 12px;
            margin: 15px auto;
            background: #ff3366;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .menu-btn:hover {
            background: #ff5588;
            transform: scale(1.05);
        }
        #multi-btn {
            background: #33ccff;
        }
        #multi-btn:hover {
            background: #55ddff;
        }
        #game-ui {
            display: none;
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1>CIRCULARITY</h1>
        <p>Absorb smaller circles to grow and change colors!</p>
        <button class="menu-btn" id="start-btn">Single Player</button>
        <button class="menu-btn" id="multi-btn">Multiplayer Mode</button>
    </div>

    <div id="game-ui">
        <p>Controls: WASD / Arrow Keys</p>
        <p>Score: <span id="score-txt">0</span> circles eaten</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameState = 'menu'; 
        let score = 0;

        const playerColors = ['#ff3366', '#ff6633', '#ffcc33', '#33ccff', '#33ff66', '#9933ff', '#ff33cc', '#00ffcc'];

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            gameState = 'playing';
        });

        document.getElementById('multi-btn').addEventListener('click', () => {
            alert("Connecting to multiplayer lobby...");
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            gameState = 'playing';
        });

        const view = {
            children: [],
            addChild(child) { 
                this.children.push(child); 
            }
        };

        const draw = {
            randomCircleInArea(canvas, fill, stroke, color, lineWidth) {
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 12 + 8,
                    color: color,
                    lineWidth: lineWidth
                };
            }
        };

        const physikz = {
            addRandomVelocity(circle, canvas, maxSpeedX, maxSpeedY) {
                circle.velocityX = (Math.random() * maxSpeedX * 2) - maxSpeedX || 2;
                circle.velocityY = (Math.random() * maxSpeedY * 2) - maxSpeedY || 2;
            },
            updatePosition(circle) {
                circle.x += circle.velocityX;
                circle.y += circle.velocityY;
            }
        };

        const Gamification = {
            init(config) {
                this.canvas = config.canvas;
                this.circles = config.circles;
                this.keys = {};
                
                window.addEventListener('keydown', (e) => this.keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => this.keys[e.key.toLowerCase()] = false);
                
                if (this.circles.length > 0) {
                    this.player = this.circles[0];
                    this.player.color = playerColors[0]; 
                    this.player.radius = 20;
                    this.player.velocityX = 0;
                    this.player.velocityY = 0;
                }
            },
            update() {
                if (!this.player || gameState !== 'playing') return;
                
                const speed = 26;
                if (this.keys['w'] || this.keys['arrowup']) this.player.y -= speed;
                if (this.keys['s'] || this.keys['arrowdown']) this.player.y += speed;
                if (this.keys['a'] || this.keys['arrowleft']) this.player.x -= speed;
                if (this.keys['d'] || this.keys['arrowright']) this.player.x += speed;

                if (this.player.radius > this.canvas.width / 3) {
                    this.player.radius = this.canvas.width / 3; 
                }

                for (let i = 1; i < this.circles.length; i++) {
                    let target = this.circles[i];
                    let dx = this.player.x - target.x;
                    let dy = this.player.y - target.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < this.player.radius + target.radius) {
                        if (this.player.radius > target.radius) {
                            this.player.radius += 1.5; 
                            
                            let randomColorIndex = Math.floor(Math.random() * playerColors.length);
                            this.player.color = playerColors[randomColorIndex];
                            
                            score++;
                            document.getElementById('score-txt').innerText = score;

                            target.x = Math.random() * this.canvas.width;
                            target.y = Math.random() * this.canvas.height;
                        }
                    }
                }
            }
        };

        // TODO 1: Declare our variables
        var circle; 
        var circles = []; 

        // TODO 2: Create a Function to Draw a Circle
        function drawCircle() {
            circle = draw.randomCircleInArea(canvas, true, true, "#999", 2);
            physikz.addRandomVelocity(circle, canvas, 5, 5);
            view.addChild(circle);
            circles.push(circle);           
        }

        // TODO 3 & TODO 7: Draw 69 Circles
        for (var i = 0; i < 69; i++) {
            drawCircle();
        }

        const game = {
            checkCirclePosition: function(circle) {
                if (circle === Gamification.player) return;

                // TODO 6: Loop from All Sides
                if (circle.x - circle.radius > canvas.width) {
                    circle.x = -circle.radius;
                }
                if (circle.x + circle.radius < 0) {
                    circle.x = canvas.width + circle.radius;
                }
                if (circle.y - circle.radius > canvas.height) {
                    circle.y = -circle.radius;
                }
                if (circle.y + circle.radius < 0) {
                    circle.y = canvas.height + circle.radius;
                }
            }
        };

        // Initialize gamification features (Moved below the 'game' object definition to fix initialization order)
        Gamification.init({
            canvas: canvas,
            view: view,
            draw: draw,
            physikz: physikz,
            circles: circles,
            game: game
        });

        // Main animation driver
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ToDo8 and ToDo 9:  Iterate over the Array to update positions and check boundaries
            for (var i = 0; i < circles.length; i++) {
                if (circles[i] !== Gamification.player) {
                    physikz.updatePosition(circles[i]);
                }
                game.checkCirclePosition(circles[i]);
            }

            // Update gamification features each frame
            Gamification.update();

            // Draw current frames
            for (var i = 0; i < view.children.length; i++) {
                let c = view.children[i];
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
                ctx.fillStyle = c.color;
                ctx.fill();
                ctx.lineWidth = c.lineWidth;
                ctx.strokeStyle = "#444";
                ctx.stroke();
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
