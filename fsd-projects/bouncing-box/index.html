<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Bouncing Box Game</title>
  <script src="jquery.min.js"></script>
  <style>
    body {
      margin: 0;
      background-color: #111;
      overflow: hidden; 
      font-family: sans-serif;
    }

    .box {
      width: 70px;
      height: 70px;
      background-image: url('https://static.wikia.nocookie.net/jujutsu-kaisen/images/4/43/Satoru_Gojo_%28JUMP_31-2023%29.png'); 
      background-size: cover;
      background-position: center;
      background-color: rgb(50, 25, 250); 
      font-size: 200%; 
      text-align: center;
      line-height: 70px;
      color: white;
      font-weight: bold;
      user-select: none;
      display: block;
      position: absolute;
      top: 100px;
      left: 0px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10; 
    }

    .board {
      height: 100vh;
      transition: background-color 0.3s ease;
    }

    .miss-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #ff4444;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
      user-select: none;
      pointer-events: none; 
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 15px;
      border-radius: 5px;
      border: 1px solid #ff4444;
      z-index: 20; 
    }

    .speed-container {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 200px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00ff66;
      padding: 10px;
      border-radius: 5px;
      z-index: 20;
    }

    .speed-label {
      color: #00ff66;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .speed-bar-bg {
      width: 100%;
      height: 15px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }

    .speed-bar-fill {
      width: 10%;
      height: 100%;
      background: #00ff66;
      transition: width 0.2s ease;
    }
  </style>
</head>

<body class="board" onclick="handleBoardClick()">

  <div class="speed-container">
    <div class="speed-label">Speed: 10</div>
    <div class="speed-bar-bg">
      <div class="speed-bar-fill"></div>
    </div>
  </div>

  <div class="miss-counter">Misses: 0 / 69</div>
  <div class="box">?</div>

  <script>
    (function () {
      "use strict";
      /* global jQuery */

      var box = jQuery(".box"); 
      var board = jQuery(".board"); 
      var missCounterElement = jQuery(".miss-counter"); 
      var speedLabel = jQuery(".speed-label");
      var speedFill = jQuery(".speed-bar-fill");
      var boardWidth = board.width(); 

      jQuery(window).on("resize", function () {
        boardWidth = board.width();
      });

      var interval = setInterval(update, 50);

      box.on("click", handleBoxClick);

      function changeBoxText(newText) {
        box.text(newText);
      }

      // Variable declarations below here
      // TODO 2: Set Up positionX to Move the Box
      var positionX = 0;   
      var positionY = 100; 
      
      // TODO 4: Set Up and Update the Score
      var points = 0;      
      
      // TODO 5: Speeding Up
      var speed = 10;
      var speedX = 10;     
      var speedY = 10;     
      var mistakes = 0;    

      var boardHeight = jQuery(window).height(); 

      function moveBoxTo(newPositionX, newPositionY) {
          box.css("left", newPositionX);
          box.css("top", newPositionY); 
      }

      function getRandomColor() {
          var r = Math.floor(Math.random() * 256);
          var g = Math.floor(Math.random() * 256);
          var b = Math.floor(Math.random() * 256);
          return "rgb(" + r + ", " + g + ", " + b + ")";
      }

      function endGame() {
          clearInterval(interval);
      }

      function update() {
          // TODO 2 & TODO 5: Update positionX in the update Function
          positionX = positionX + speedX;
          positionY = positionY + speedY;

          // TODO 6: Make the Box Bounce off the Right Side
          if (positionX > boardWidth) {
              speedX *= -1; 
          }
          
          // TODO 7: Make the Box Bounce off the Left Side
          if (positionX < 0) {
              speedX *= -1; 
          }

          if (positionY > (boardHeight - 70)) {
              speedY *= -1; 
          }
          if (positionY < 0) {
              speedY *= -1; 
          }

          // TODO 2: Update Your moveBoxTo Function Call
          moveBoxTo(positionX, positionY);
      }

      function updateSpeedUI(currentSpeed) {
          speedLabel.text("Speed: " + currentSpeed);
          var maxExpectedSpeed = 100; 
          var percentage = (currentSpeed / maxExpectedSpeed) * 100;
          if (percentage > 100) percentage = 100;
          speedFill.css("width", percentage + "%");
      }

      function handleBoxClick(event) {
          if (event) {
              event.stopPropagation();
          }

          // TODO 4: Increment the points Variable on Each Click
          points++;
          
          // TODO 3 & TODO 4: Display Text on the Box using points
          changeBoxText(points);

          // TODO 3: Reset positionX to 0 in handleBoxClick
          positionX = 0;
          positionY = Math.random() * (boardHeight - 70);

          box.css("background-color", getRandomColor());

          // TODO 8: Fix the Speed Bug with a Linear Formula
          speed = 3 * points + 10;
          
          if (points % 3 === 0) {
              speed += 15; 
              board.css('background-color', getRandomColor());
          }

          speedX = speedX < 0 ? -speed : speed;
          speedY = speedY < 0 ? -speed : speed;

          updateSpeedUI(speed);
      }

      window.handleBoardClick = function() {
          mistakes++;
          
          missCounterElement.text("Misses: " + mistakes + " / 69");
          
          if (mistakes >= 69) {
              endGame(); 
              
              alert("Game Over! You missed 69 times. Final Score: " + points);
              
              location.reload();
          }
      };

    })();
  </script>
</body>

</html>
