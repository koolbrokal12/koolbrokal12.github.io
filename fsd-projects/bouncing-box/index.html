<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Bouncing Box Game</title>
  <script src="jquery.min.js"></script>
  <style>
    body {
      margin: 0;
      background-color: #111;
      overflow: hidden; 
      font-family: sans-serif;
    }

    .box {
      width: 70px;
      height: 70px;
      background-image: url('https://static.wikia.nocookie.net/jujutsu-kaisen/images/4/43/Satoru_Gojo_%28JUMP_31-2023%29.png'); 
      background-size: cover;
      background-position: center;
      background-color: rgb(50, 25, 250); 
      font-size: 200%; 
      text-align: center;
      line-height: 70px;
      color: white;
      font-weight: bold;
      user-select: none;
      display: block;
      position: absolute;
      top: 100px;
      left: 0px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10; 
    }

    .trail-particle {
      width: 70px;
      height: 70px;
      background-color: rgba(0, 255, 100, 0.6); 
      position: absolute;
      border-radius: 8px;
      pointer-events: none; 
      z-index: 1; 
      transition: opacity 0.3s ease, transform 0.3s ease; 
    }

    .board {
      height: 100vh;
      transition: background-color 0.3s ease;
    }

    .miss-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #ff4444;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
      user-select: none;
      pointer-events: none; 
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 15px;
      border-radius: 5px;
      border: 1px solid #ff4444;
      z-index: 20; 
    }

    .speed-container {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 200px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00ff66;
      padding: 10px;
      border-radius: 5px;
      z-index: 20;
    }

    .speed-label {
      color: #00ff66;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .speed-bar-bg {
      width: 100%;
      height: 15px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }

    .speed-bar-fill {
      width: 10%;
      height: 100%;
      background: #00ff66;
      transition: width 0.2s ease;
    }
  </style>
</head>

<body class="board" onclick="handleBoardClick()">

  <div class="speed-container">
    <div class="speed-label">Speed: 10</div>
    <div class="speed-bar-bg">
      <div class="speed-bar-fill"></div>
    </div>
  </div>

  <div class="miss-counter">Misses: 0 / 69</div>
  <div class="box">?</div>

  <script>
    (function () {
      "use strict";
      /* global jQuery */

      var box = jQuery(".box"); 
      var board = jQuery(".board"); 
      var missCounterElement = jQuery(".miss-counter"); 
      var speedLabel = jQuery(".speed-label");
      var speedFill = jQuery(".speed-bar-fill");
      var boardWidth = board.width(); 

      jQuery(window).on("resize", function () {
        boardWidth = board.width();
      });

      var interval = setInterval(update, 50);

      box.on("click", handleBoxClick);

      function changeBoxText(newText) {
        box.text(newText);
      }

      var positionX = 0;   
      var positionY = 100; 
      var points = 0;      
      var speedX = 10;     
      var speedY = 10;     
      var mistakes = 0;    

      var boardHeight = jQuery(window).height(); 

      function moveBoxTo(newPositionX, newPositionY) {
          box.css("left", newPositionX);
          box.css("top", newPositionY); 
      }

      function getRandomColor() {
          var r = Math.floor(Math.random() * 256);
          var g = Math.floor(Math.random() * 256);
          var b = Math.floor(Math.random() * 256);
          return "rgb(" + r + ", " + g + ", " + b + ")";
      }

      function endGame() {
          clearInterval(interval);
      }

      function createTrail(x, y) {
          var particle = jQuery("<div>").addClass("trail-particle");
          
          particle.css({
              left: x + "px",
              top: y + "px"
          });
          
          board.append(particle);
          
          setTimeout(function() {
              particle.css({
                  "opacity": "0",
                  "transform": "scale(0.5)" 
              });
          }, 50);
          
          setTimeout(function() {
              particle.remove();
          }, 350);
      }

      function update() {
          createTrail(positionX, positionY);

          positionX = positionX + speedX;
          positionY = positionY + speedY;

          if (positionX > (boardWidth - 70)) {
              speedX *= -1; 
          }
          if (positionX < 0) {
              speedX *= -1; 
          }

          if (positionY > (boardHeight - 70)) {
              speedY *= -1; 
          }
          if (positionY < 0) {
              speedY *= -1; 
          }

          moveBoxTo(positionX, positionY);
      }

      function updateSpeedUI(currentSpeed) {
          speedLabel.text("Speed: " + currentSpeed);
          var maxExpectedSpeed = 100; 
          var percentage = (currentSpeed / maxExpectedSpeed) * 100;
          if (percentage > 100) percentage = 100;
          speedFill.css("width", percentage + "%");
      }

      function handleBoxClick(event) {
          if (event) {
              event.stopPropagation();
          }

          points++;
          changeBoxText(points);

          positionX = Math.random() * (boardWidth - 70);
          positionY = Math.random() * (boardHeight - 70);

          box.css("background-color", getRandomColor());

          var currentModifier = 3 * points + 10;
          
          if (points % 3 === 0) {
              currentModifier += 15; 
              board.css('background-color', getRandomColor());
          }

          speedX = speedX < 0 ? -currentModifier : currentModifier;
          speedY = speedY < 0 ? -currentModifier : currentModifier;

          updateSpeedUI(currentModifier);
      }

      window.handleBoardClick = function() {
          mistakes++;
          
          // Updated string template to show max 69
          missCounterElement.text("Misses: " + mistakes + " / 69");
          
          // Updated conditional limit check to 69
          if (mistakes >= 69) {
              endGame(); 
              
              alert("Game Over! You missed 69 times. Final Score: " + points);
              
              location.reload();
          }
      };

    })();
  </script>
</body>

</html>
