<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Bouncing Box Game</title>
  <script src="jquery.min.js"></script>
  <style>
    body {
      margin: 0;
      background-color: #111;
    }

    /* Styling for the target box */
    .box {
      width: 70px;
      height: 70px;
      background-color: rgb(50, 25, 250);
      font-size: 300%;
      text-align: center;
      line-height: 70px;
      color: white;
      user-select: none;
      display: block;
      position: absolute;
      top: 100px;
      left: 0px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* The screen background */
    .board {
      height: 100vh;
      transition: background-color 0.3s ease;
    }
  </style>
</head>

<body class="board" onclick="handleBoardClick()">

  <div class="box">?</div>

  <script>
    (function () {
      "use strict";
      /* global jQuery */

      // Setting up the basic elements and screen width
      var box = jQuery(".box"); 
      var board = jQuery(".board"); 
      var boardWidth = board.width(); 

      // Recalculates the screen width if the user resizes their window
      jQuery(window).on("resize", function () {
        boardWidth = board.width();
      });

      // Runs the update function 20 times every second to keep things moving
      setInterval(update, 50);

      // Links our success function to the box when clicked
      box.on("click", handleBoxClick);

      // Simple tool to swap out the text inside the box
      function changeBoxText(newText) {
        box.text(newText);
      }

      // ==========================================
      // GAME VARIABLES
      // ==========================================
      var positionX = 0;   // Where the box is horizontally
      var positionY = 100; // Where the box is vertically
      var points = 0;      // Current score
      var speedX = 10;     // Current horizontal speed/direction
      var speedY = 10;     // Current vertical speed/direction
      var mistakes = 0;    // Number of missed clicks

      // Grabs the total height of the browser screen
      var boardHeight = jQuery(window).height(); 

      // Moves the box around using custom X and Y coordinates
      function moveBoxTo(newPositionX, newPositionY) {
          box.css("left", newPositionX);
          box.css("top", newPositionY); 
      }

      // Generates a fully randomized color
      function getRandomColor() {
          var r = Math.floor(Math.random() * 256);
          var g = Math.floor(Math.random() * 256);
          var b = Math.floor(Math.random() * 256);
          return "rgb(" + r + ", " + g + ", " + b + ")";
      }

      // ==========================================
      // MAIN MOVEMENT LOOP
      // ==========================================
      function update() {
          // Push the box forward on both axes
          positionX = positionX + speedX;
          positionY = positionY + speedY;

          // Bounces the box back if it touches the right or left walls
          if (positionX > (boardWidth - 70)) {
              speedX *= -1; 
          }
          if (positionX < 0) {
              speedX *= -1; 
          }

          // Bounces the box back if it touches the top or bottom walls
          if (positionY > (boardHeight - 70)) {
              speedY *= -1; 
          }
          if (positionY < 0) {
              speedY *= -1; 
          }

          // Redraws the box at the coordinates we just calculated
          moveBoxTo(positionX, positionY);
      }

      // ==========================================
      // SUCCESSFUL CLICKS (HITTING THE BOX)
      // ==========================================
      function handleBoxClick(event) {
          // Keeps the click from triggering a background miss at the same time
          if (event) {
              event.stopPropagation();
          }

          // Give them a point and update the score on the box
          points++;
          changeBoxText(points);

          // Teleport the box to a completely random spot on the screen
          positionX = Math.random() * (boardWidth - 70);
          positionY = Math.random() * (boardHeight - 70);

          // Swap out the box color for a random one
          box.css("background-color", getRandomColor());

          // Gradually speed up the box using our linear equation
          var currentModifier = 3 * points + 10;
          
          // Every 3 hits, inject an extra burst of speed and flash the background color
          if (points % 3 === 0) {
              currentModifier += 15; 
              board.css('background-color', getRandomColor());
          }

          // Apply the new speed without messing up the direction the box was already headed
          speedX = speedX < 0 ? -currentModifier : currentModifier;
          speedY = speedY < 0 ? -currentModifier : currentModifier;
      }

      // ==========================================
      // MISSED CLICKS (HITTING THE BACKGROUND)
      // ==========================================
      window.handleBoardClick = function() {
          // Log the miss
          mistakes++;
          
          // Trigger a game over if they miss 59 times
          if (mistakes >= 59) {
              alert("Game Over! You missed 59 times.");
              
              // Reset all of our tracking statistics back to the beginning
              points = 0;
              mistakes = 0;
              speedX = 10;
              speedY = 10;
              positionX = 0;
              positionY = 100;
              
              // Reset all colors and text back to original settings
              changeBoxText("?");
              box.css("background-color", "rgb(50, 25, 250)"); 
              board.css('background-color', ''); 
          }
      };

    })(); // Safely wraps up our outer template logic
  </script>
</body>

</html>
