<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Runtime Neo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
        }
        canvas {
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            display: block;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas" width="800" height="400"></canvas>
    </div>

    <script>
        // --- GAME CONFIGURATION & STATE ---
        let canvas, ctx;
        let activeEntities = [];
        let activeProjectiles = [];
        let currentLevelIndex = 0;
        let activeLevel = null;
        
        const player = { 
            x: 100, 
            y: 340, // Ground level baseline
            width: 40,
            height: 40,
            velocityY: 0,
            isJumping: false,
            health: 200, 
            score: 0, 
            hasWon: false 
        };
        
        const controls = {};

        const sceneryData = {
            buildings: {
                loopBounds: 1200,
                elements: [
                    { x: 0, width: 100, height: 300, parallaxSpeed: -2 },
                    { x: 300, width: 150, height: 400, parallaxSpeed: -1.5 },
                    { x: 650, width: 120, height: 250, parallaxSpeed: -2.2 },
                    { x: 900, width: 180, height: 450, parallaxSpeed: -1.2 }
                ]
            },
            lamps: {
                loopBounds: 800,
                elements: [
                    { x: 150, width: 20, height: 100, parallaxSpeed: -3 },
                    { x: 450, width: 20, height: 100, parallaxSpeed: -3 },
                    { x: 750, width: 20, height: 100, parallaxSpeed: -3 },
                    { x: 1050, width: 20, height: 100, parallaxSpeed: -3 }
                ]
            }
        };

        const levelData = [
            {
                name: "Level 1: Ground Zero",
                scrollSpeed: 3,
                mapObjects: [
                    { type: "platform", x: 200, y: 250, width: 150, height: 20 },
                    { type: "platform", x: 500, y: 180, width: 150, height: 20 },
                    { type: "platform", x: 800, y: 230, width: 150, height: 20 },
                    { type: "obstacle", x: 400, y: 340, width: 40, height: 40, hp: Infinity },
                    { type: "obstacle", x: 700, y: 340, width: 40, height: 40, hp: 1 },
                    { type: "obstacle", x: 1100, y: 340, width: 40, height: 40, hp: Infinity },
                    { type: "enemy", x: 450, y: 320, width: 40, height: 40, speedX: -1, speedY: 0, hp: 1 },
                    { type: "enemy", x: 750, y: 320, width: 40, height: 40, speedX: -2, speedY: 0, hp: 1 },
                    { type: "enemy", x: 1000, y: 320, width: 40, height: 40, speedX: -1, speedY: 0, hp: 2 },
                    { type: "powerup", x: 550, y: 120, width: 30, height: 30 },
                    { type: "powerup", x: 850, y: 150, width: 30, height: 30 },
                    { type: "goal", x: 1400, y: 280, width: 50, height: 80 }
                ]
            },
            {
                name: "Level 2: High Voltage",
                scrollSpeed: 5,
                mapObjects: [
                    { type: "platform", x: 200, y: 220, width: 120, height: 20 },
                    { type: "platform", x: 450, y: 150, width: 120, height: 20 },
                    { type: "platform", x: 700, y: 250, width: 120, height: 20 },
                    { type: "platform", x: 950, y: 160, width: 120, height: 20 },
                    { type: "obstacle", x: 350, y: 340, width: 40, height: 40, hp: Infinity },
                    { type: "obstacle", x: 600, y: 340, width: 40, height: 40, hp: 1 },
                    { type: "obstacle", x: 800, y: 340, width: 40, height: 40, hp: Infinity },
                    { type: "obstacle", x: 1100, y: 340, width: 40, height: 40, hp: 1 },
                    { type: "obstacle", x: 1300, y: 340, width: 40, height: 40, hp: Infinity },
                    { type: "enemy", x: 300, y: 320, width: 40, height: 40, speedX: -2, speedY: 0, hp: 1 },
                    { type: "enemy", x: 550, y: 320, width: 40, height: 40, speedX: -3, speedY: 0, hp: 1 },
                    { type: "enemy", x: 850, y: 320, width: 40, height: 40, speedX: -2, speedY: 0, hp: 2 },
                    { type: "enemy", x: 1050, y: 320, width: 40, height: 40, speedX: -4, speedY: 0, hp: 1 },
                    { type: "enemy", x: 1250, y: 320, width: 40, height: 40, speedX: -1, speedY: 0, hp: 3 },
                    { type: "powerup", x: 250, y: 150, width: 30, height: 30 },
                    { type: "powerup", x: 500, y: 90, width: 30, height: 30 },
                    { type: "powerup", x: 1000, y: 100, width: 30, height: 30 },
                    { type: "goal", x: 1600, y: 220, width: 50, height: 80 }
                ]
            },
            {
                name: "Level 3: The Final Challenge",
                scrollSpeed: 6,
                mapObjects: [
                    { type: "platform", x: 150, y: 250, width: 100, height: 20 },
                    { type: "platform", x: 350, y: 180, width: 100, height: 20 },
                    { type: "platform", x: 600, y: 120, width: 100, height: 20 },
                    { type: "platform", x: 850, y: 200, width: 100, height: 20 },
                    { type: "platform", x: 1100, y: 150, width: 100, height: 20 },
                    { type: "obstacle", x: 300, y: 340, width: 40, height: 40, hp: Infinity },
                    { type: "obstacle", x: 500, y: 340, width: 40, height: 40, hp: 2 },
                    { type: "obstacle", x: 550, y: 340, width: 40, height: 40, hp: Infinity },
                    { type: "obstacle", x: 750, y: 340, width: 40, height: 40, hp: 1 },
                    { type: "obstacle", x: 950, y: 340, width: 40, height: 40, hp: Infinity },
                    { type: "obstacle", x: 1200, y: 340, width: 40, height: 40, hp: 1 },
                    { type: "obstacle", x: 1400, y: 340, width: 40, height: 40, hp: Infinity },
                    { type: "enemy", x: 200, y: 320, width: 40, height: 40, speedX: -3, speedY: 0, hp: 1 },
                    { type: "enemy", x: 400, y: 320, width: 40, height: 40, speedX: -4, speedY: 0, hp: 2 },
                    { type: "enemy", x: 650, y: 320, width: 40, height: 40, speedX: -2, speedY: 0, hp: 3 },
                    { type: "enemy", x: 900, y: 320, width: 40, height: 40, speedX: -5, speedY: 0, hp: 1 },
                    { type: "enemy", x: 1150, y: 320, width: 40, height: 40, speedX: -3, speedY: 0, hp: 2 },
                    { type: "enemy", x: 1350, y: 320, width: 40, height: 40, speedX: -6, speedY: 0, hp: 1 },
                    { type: "powerup", x: 200, y: 190, width: 30, height: 30 },
                    { type: "powerup", x: 400, y: 120, width: 30, height: 30 },
                    { type: "powerup", x: 650, y: 60, width: 30, height: 30 },
                    { type: "powerup", x: 900, y: 140, width: 30, height: 30 },
                    { type: "goal", x: 1750, y: 220, width: 50, height: 80 }
                ]
            }
        ];


        function init() {
            canvas = document.getElementById("canvas");
            ctx = canvas.getContext("2d");
            activeLevel = levelData[currentLevelIndex];
            
            buildLevelEntities();

            window.addEventListener("keydown", e => { 
                controls[e.code] = true; 
                if (e.code === "Space") spawnProjectile(); 
            });
            window.addEventListener("keyup", e => { controls[e.code] = false; });

            window.requestAnimationFrame(gameLoop);
        }

        function buildLevelEntities() {
            activeEntities = activeLevel.mapObjects.map(item => ({...item}));
        }

        function spawnProjectile() {
            activeProjectiles.push({ x: player.x + 40, y: player.y + 15, speedX: 8 });
        }

        function triggerNextLevel() {
            currentLevelIndex++;
            activeEntities = [];
            activeProjectiles = [];
            
            if (currentLevelIndex >= levelData.length) {
                player.hasWon = true;
            } else {
                activeLevel = levelData[currentLevelIndex];
                buildLevelEntities();
            }
        }



        function checkCollision(box1, box2) {
            return box1.x < box2.x + box2.width &&
                   box1.x + (box1.width || 10) > box2.x &&
                   box1.y < box2.y + box2.height &&
                   box1.y + (box1.height || 5) > box2.y;
        }

        function evaluateCollisions() {
            // Player vs Interactive Entities Loop
            for (let i = activeEntities.length - 1; i >= 0; i--) {
                let entity = activeEntities[i];
                if (entity.type === "platform") continue;

                if (checkCollision(player, entity)) {
                    if (entity.type === "obstacle" || entity.type === "enemy") {
                        player.health -= 20;
                        activeEntities.splice(i, 1);
                    } else if (entity.type === "powerup") {
                        player.health = Math.min(100, player.health + 20);
                        activeEntities.splice(i, 1);
                    } else if (entity.type === "goal") {
                        triggerNextLevel();
                        return;
                    }
                }
            }

            for (let p = activeProjectiles.length - 1; p >= 0; p--) {
                let bullet = activeProjectiles[p];
                
                for (let e = activeEntities.length - 1; e >= 0; e--) {
                    let entity = activeEntities[e];
                    
                    if (checkCollision(bullet, entity)) {
                        if (entity.hp !== Infinity) {
                            entity.hp--;
                            if (entity.hp <= 0) {
                                activeEntities.splice(e, 1);
                                player.score += 100;
                            }
                        }
                        activeProjectiles.splice(p, 1);
                        break;
                    }
                }
            }
        }



        function updatePhysics() {
            // Background environment panning
            sceneryData.buildings.elements.forEach(b => {
                b.x += b.parallaxSpeed - activeLevel.scrollSpeed;
                if (b.x + b.width < 0) b.x = sceneryData.buildings.loopBounds;
            });

            sceneryData.lamps.elements.forEach(l => {
                l.x += l.parallaxSpeed - activeLevel.scrollSpeed;
                if (l.x + l.width < 0) l.x = sceneryData.lamps.loopBounds;
            });

            activeEntities.forEach(ent => {
                ent.x += (ent.speedX || 0) - activeLevel.scrollSpeed;
                ent.y += (ent.speedY || 0);
            });

            
            if (controls["ArrowLeft"]) player.x = Math.max(0, player.x - 4);
            if (controls["ArrowRight"]) player.x = Math.min(canvas.width - player.width, player.x + 4);
            
           
            if (controls["ArrowUp"] && !player.isJumping) {
                player.velocityY = -12;
                player.isJumping = true;
            }

           
            player.velocityY += 0.5;
            player.y += player.velocityY;

            
            if (player.y >= 340) {
                player.y = 340;
                player.velocityY = 0;
                player.isJumping = false;
            }

            activeEntities.filter(e => e.type === "platform").forEach(platform => {
                if (player.x + player.width > platform.x && 
                    player.x < platform.x + platform.width &&
                    player.y + player.height >= platform.y && 
                    player.y + 30 < platform.y && 
                    player.velocityY > 0) {
                    
                    player.y = platform.y - player.height;
                    player.velocityY = 0;
                    player.isJumping = false;
                }
            });

            for (let i = activeProjectiles.length - 1; i >= 0; i--) {
                activeProjectiles[i].x += activeProjectiles[i].speedX;
                if (activeProjectiles[i].x > canvas.width) activeProjectiles.splice(i, 1);
            }

            evaluateCollisions();
        }


        function drawGraphics() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            
            if (player.hasWon) {
                ctx.fillStyle = "#00ff00";
                ctx.font = "bold 30px sans-serif";
                ctx.fillText("You won congrats", 180, 200);
                return;
            }
            if (player.health <= 0) {
                ctx.fillStyle = "#ff0000";
                ctx.font = "bold 30px sans-serif";
                ctx.fillText("you died you failed the mission", 320, 200);
                return;
            }


            ctx.fillStyle = "#223";
            sceneryData.buildings.elements.forEach(b => {
                ctx.fillRect(b.x, canvas.height - b.height, b.width, b.height);
            });
            ctx.fillStyle = "#ff0";
            sceneryData.lamps.elements.forEach(l => {
                ctx.fillRect(l.x, canvas.height - l.height, l.width, l.height);
            });

          
            activeEntities.forEach(ent => {
                if (ent.type === "platform") ctx.fillStyle = "#555";
                else if (ent.type === "obstacle") ctx.fillStyle = "#ff0000";
                else if (ent.type === "enemy") ctx.fillStyle = "orange";
                else if (ent.type === "powerup") ctx.fillStyle = "#00ff00";
                else if (ent.type === "goal") ctx.fillStyle = "#ffff00";
                
                ctx.fillRect(ent.x, ent.y, ent.width, ent.height);
            });

       
            ctx.fillStyle = "#ff00ff";
            activeProjectiles.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 10, 5);
            });

        
            ctx.fillStyle = "#00d2ff"; 
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.fillStyle = "#111"; 
            ctx.fillRect(player.x + 5, player.y + 5, 30, 15);


            ctx.fillStyle = player.health < 40 ? "#ff0055" : "#00ffcc"; 
            ctx.fillRect(player.x + 10, player.y + 8, 20, 8);

            if (player.isJumping) {
                ctx.fillStyle = Math.random() > 0.5 ? "#ff3300" : "#ff9900"; 
                ctx.fillRect(player.x - 10, player.y + 20, 10, 12);
            } else {
                ctx.fillStyle = "#888";
                ctx.fillRect(player.x - 6, player.y + 10, 6, 20);
            }


            ctx.fillStyle = "#333";
            ctx.fillRect(player.x + 2, player.y + 38, 36, 5); 
            ctx.fillStyle = "#555";
            ctx.fillRect(player.x + 6, player.y + 39, 6, 3);  
            ctx.fillRect(player.x + 28, player.y + 39, 6, 3); 

            ctx.fillStyle = "#fff";
            ctx.font = "600 16px sans-serif";
            ctx.fillText(activeLevel.name, 20, 30);
            ctx.fillText("Score: " + player.score, 680, 30);
            ctx.fillText("HP: " + player.health, 680, 55);
        }

        function gameLoop() {
            if (!player.hasWon && player.health > 0) {
                updatePhysics();
            }
            drawGraphics();
            window.requestAnimationFrame(gameLoop);
        }

        window.onload = init;
    </script>
</body>
</html>
